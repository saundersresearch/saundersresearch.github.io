name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3.6'
          bundler-cache: true

      - name: Set up Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Commit webmentions to repo
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add webmentions
          git commit -m "Update webmentions" || echo "No changes to commit"
          git push
    
      - name: Debug list cache location
        run: |
          echo "Working directory: $(pwd)"
          find . -maxdepth 3 -type d -name "webmentions" -print
          ls -R webmentions || echo "No local cache found"

      - name: Upload rebuilt site artifact
        uses: actions/upload-pages-artifact@v3


  webmention:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3.6'
          bundler-cache: true
            
      - name: Set up Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Rebuild with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
          
      - name: Send webmentions with Jekyll
        run: bundle exec jekyll webmention
        env:
          JEKYLL_ENV: production

      - name: Commit webmentions to repo
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add webmentions
          git commit -m "Update webmentions" || echo "No changes to commit"
          git push
    
      - name: Print Jekyll webmention cache
        run: ls -lh webmentions && cat webmentions/*.yml || true

      - name: Upload updated webmentions
        uses: actions/upload-artifact@v4
        with:
          name: cache-after-webmention
          include-hidden-files: true
          path: webmentions
          if-no-files-found: error

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

